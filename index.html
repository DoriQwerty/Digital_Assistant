<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Ассистент совещаний</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="wrap">
  <h1>AI ассистент совещаний</h1>

  <label>Аудиозапись</label>
  <div class="upload-area" id="zone">
    <input type="file" id="fi" accept=".mp3,.wav,.m4a,.ogg,.flac">
    <span class="upload-icon">🎙</span>
    Выбери файл или перетащи сюда<br>
    <small>mp3 · wav · m4a · ogg · flac</small>
    <div id="fname"></div>
  </div>
  <div class="err" id="err"></div>

  <button id="btn" disabled onclick="go()">Обработать</button>

  <div class="progress-row" id="prog">
    <span id="plabel">Обрабатываю...</span>
    <div class="bar"><div class="fill" id="pfill"></div></div>
  </div>

  <div class="results" id="results">
    <div class="card">
      <div class="card-head">Расшифровка</div>
      <div class="card-body" id="transcription"></div>
    </div>
    <div class="card">
      <div class="card-head">Саммари</div>
      <div class="card-body" id="summary"></div>
    </div>
    <div class="card">
      <div class="card-head">Участники</div>
      <div class="card-body card-body--list" id="participants"></div>
    </div>
    <div class="card">
      <div class="card-head">Задачи</div>
      <div class="card-body card-body--list" id="tasks"></div>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
